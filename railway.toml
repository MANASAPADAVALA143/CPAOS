# Read when the Railway service Root Directory is the repo root (empty / ".").
# Forces Docker so `pip` is available (avoids Railpack "pip: not found").
#
# If you instead set Root Directory to `backend`, Railway uses backend/railway.toml
# and backend/Dockerfile.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
